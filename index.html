<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Chat - Secure Messenger</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <style>
        body {
            background-color: #f0f5f7;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* --- Wallet Connect Screen Styling --- */
        .connect-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
        }
        .wallet-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(0, 121, 107, 0.1);
        }
        .brand-logo {
            font-size: 50px;
            color: #004d40;
            margin-bottom: 15px;
        }
        .wallet-card h2 {
            color: #004d40;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .wallet-card p {
            color: #00796b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-connect {
            background-color: #00796b;
            border-color: #00796b;
            color: #ffffff;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-connect:hover {
            background-color: #004d40;
            border-color: #004d40;
            transform: translateY(-2px);
        }

        /* --- Main App Screen Styling --- */
        .app-container {
            display: none;
            height: 100vh;
            width: 100vw;
            background: #fff;
            margin: 0;
        }
        .sidebar {
            background: #004d40;
            color: #fff;
            border-right: 1px solid #00332c;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .search-box {
            padding: 15px;
            background: #004d40;
        }
        .search-box input {
            background: #00796b;
            border: none;
            border-radius: 5px;
            color: #fff;
            padding: 8px 12px;
            width: 100%;
            outline: 0;
            font-size: 14px;
        }
        .search-box input::placeholder { color: #b2dfdb; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #00332c;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #fff;
        }
        .chat-item.active, .chat-item:hover {
            background: #00796b;
            text-decoration: none;
            color: #fff;
        }
        .chat-item img { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; }
        
        /* --- අලුතින් එකතු කල Logout Panel එකේ CSS --- */
        .sidebar-footer {
            padding: 15px;
            background: #00332c;
            border-top: 1px solid #00221d;
        }
        .btn-logout {
            background-color: #e57373;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .btn-logout:hover {
            background-color: #c62828;
            color: white;
            transform: translateY(-1px);
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background: #e0f2f1;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            height: 100vh;
        }
        .chat-header {
            background: #004d40;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #00332c;
            justify-content: space-between;
        }
        .chat-header-info { display: flex; align-items: center; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Messages Styling */
        .message { margin-bottom: 15px; display: flex; flex-direction: column; max-width: 70%; position: relative; }
        .message.received { align-items: flex-start; align-self: flex-start; }
        .message.sent { align-items: flex-end; align-self: flex-end; }
        .bubble { padding: 10px 15px; border-radius: 12px; font-size: 14px; color: #fff; word-wrap: break-word; }
        .received .bubble { background: #00796b; border-top-left-radius: 0; }
        .sent .bubble { background: #004d40; border-top-right-radius: 0; }
        .msg-time { font-size: 10px; color: #b2dfdb; margin-top: 3px; display: block; }
        .received .msg-time { color: #e0f2f1; }
        .msg-actions { font-size: 10px; color: #00796b; margin-top: 3px; display: flex; gap: 10px; }
        .msg-actions span { cursor: pointer; }
        .msg-actions span:hover { color: #004d40; font-weight: 700; }
        
        .chat-footer { padding: 15px; background: #004d40; display: flex; align-items: center; }
        .chat-footer input {
            flex: 1; background: #00796b; border: none; border-radius: 20px;
            padding: 10px 20px; color: #fff; outline: 0;
        }
        .chat-footer input::placeholder { color: #b2dfdb; }
        .send-btn { background: 0 0; border: none; color: #fff; font-size: 22px; margin-left: 15px; cursor: pointer; }
        .no-chat-selected { display: flex; align-items: center; justify-content: center; height: 100%; color: #004d40; font-size: 16px; background: #e0f2f1; font-weight: 500; }
