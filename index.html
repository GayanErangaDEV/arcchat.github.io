<!doctype html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>ARC Chat - Secure Messenger</title>
<link rel=stylesheet href=https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css>
<link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css>
<script src=https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js></script>
<style>
    body{background-color:#f8f9fa;font-family:'Segoe UI',sans-serif;height:100vh;margin:0;overflow:hidden}
    .connect-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#eef1f5 0,#d1d8dd 100%)}
    .wallet-card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(16,34,64,.1);text-align:center;max-width:450px;width:100%;border:1px solid rgba(16,34,64,.1)}
    .brand-logo{font-size:50px;color:#102240;margin-bottom:15px}
    .wallet-card h2{color:#102240;font-weight:700;margin-bottom:10px}
    .btn-connect{background-color:#717d84;border-color:#717d84;color:#fff;font-weight:600;padding:12px 30px;border-radius:50px;width:100%;transition:all .3s ease}
    .btn-connect:hover{background-color:#102240;border-color:#102240;transform:translateY(-2px)}
    .app-container{display:none;height:100vh;width:100vw;background:#fff;margin:0}
    .sidebar{background:#102240;color:#fff;border-right:1px solid #0a1629;display:flex;flex-direction:column;height:100vh}
    .search-box{padding:15px;background:#102240}
    .search-box input{background:#717d84;border:none;border-radius:5px;color:#fff;padding:8px 12px;width:100%;outline:0;font-size:14px}
    .chat-list{flex:1;overflow-y:auto}
    .chat-item{padding:15px;border-bottom:1px solid #0a1629;cursor:pointer;display:flex;align-items:center;color:#fff}
    .chat-item.active,.chat-item:hover{background:#717d84;text-decoration:none;color:#fff}
    .chat-item img{width:40px;height:40px;border-radius:50%;margin-right:12px}
    .chat-area{display:flex;flex-direction:column;background:#f8f9fa;background-image:url('https://www.transparenttextures.com/patterns/cubes.png');height:100vh}
    .chat-header{background:#102240;color:#fff;padding:15px 20px;display:flex;align-items:center;border-bottom:1px solid #0a1629;justify-content:space-between}
    .chat-header-info{display:flex;align-items:center}
    .chat-header img{width:40px;height:40px;border-radius:50%;margin-right:15px}
    .chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
    .message{margin-bottom:15px;display:flex;flex-direction:column;max-width:70%;position:relative}
    .message.received{align-items:flex-start;align-self:flex-start}
    .message.sent{align-items:flex-end;align-self:flex-end}
    .bubble{padding:10px 15px;border-radius:12px;font-size:14px;color:#fff;word-wrap:break-word}
    .received .bubble{background:#717d84;border-top-left-radius:0}
    .sent .bubble{background:#102240;border-top-right-radius:0}
    .msg-time{font-size:10px;color:#e0e0e0;margin-top:3px;display:block}
    .msg-actions{font-size:10px;color:#717d84;margin-top:3px;display:flex;gap:10px}
    .chat-footer{padding:15px;background:#102240;display:flex;align-items:center}
    .chat-footer input{flex:1;background:#717d84;border:none;border-radius:20px;padding:10px 20px;color:#fff;outline:0}
    .send-btn{background:0 0;border:none;color:#fff;font-size:22px;margin-left:15px;cursor:pointer}
    .btn-logout{background:#643873;color:#fff;border:none;padding:10px;margin:10px;border-radius:5px;cursor:pointer}
    .btn-logout:hover{background:#8e4585}
    
    /* නව අයිකන් ස්ටයිල්ස් */
    .header-actions { display: flex; gap: 15px; align-items: center; }
    .label-chat-btn, .delete-chat-btn { padding: 8px 12px; border-radius: 50%; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1); cursor: pointer; }
    .label-chat-btn:hover { background: #fff; color: #102240 !important; transform: scale(1.1); }
    .delete-chat-btn:hover { background: #ff4d4d; color: #fff !important; transform: scale(1.1); }
</style>
</head>
<body>
<div class=connect-screen id=connectScreen>
<div class=wallet-card>
<div class=brand-logo><i class="fas fa-comments"></i></div>
<h2>ARC Chat</h2>
<p>Connect your Web3 Wallet to start secure, end-to-end blockchain conversations.</p>
<button class="btn btn-connect btn-lg" id=connectWalletBtn onclick=connectWallet()>
<i class="fas fa-wallet mr-2"></i> Connect Wallet
</button>
<div class="mt-3 text-muted" id=syncStatus style=font-size:11px> Checking Web3 provider...</div>
</div>
</div>
<div class="app-container row no-gutters" id=appScreen>
<div class="col-md-4 col-4 sidebar">
<div class=search-box>
<input id=searchAddressInput style="color: black !important;" placeholder="Search Wallet Address + Enter..." onkeypress=handleSearch(event)>
</div>
<div class=chat-list id=chatListContainer></div>
<button class=btn-logout onclick=logout()><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
<div class="col-md-8 col-8 chat-area" id=chatAreaContainer>
<div class=no-chat-selected id=noChatPlaceholder style=display:flex;align-items:center;justify-content:center;height:100%;color:#102240;font-weight:500>
Select or search a user to start conversation
</div>
<div id=activeChatBox style=display:none;flex-direction:column;height:100%>
<div class=chat-header>
<div class=chat-header-info>
<img src="https://ui-avatars.com/api/?name=User&background=random" id=activeChatAvatar alt=Avatar>
<div>
<h5 class=mb-0 id=activeChatTitle>0x000...000</h5>
<small class=text-info id=activeChatSubtitle style=color:#e0e0e0!important>End-to-End Blockchain Chat</small>
</div>
</div>
<div class="header-actions">
    <div class="label-chat-btn" id="labelChatBtn" title="Set/Remove Wallet Tag Name"><i class="fas fa-tag"></i></div>
    <div class="delete-chat-btn" id="deleteChatBtn" title="Close conversation view"><i class="fas fa-times"></i></div>
</div>
</div>
<div class=chat-body id=chatBody></div>
<div class=chat-footer>
<input id=messageInput placeholder="Write a message...">
<button class=send-btn id=sendBtn onclick=sendMessage()><i class="fas fa-paper-plane"></i></button>
</div>
</div>
</div>
</div>
<script>
// (ඔබේ පෙර පැවති JavaScript කේතයම මෙහි භාවිතා කරන්න - වෙනස් කිරීමට අවශ්‍ය නැත)

</body>
</html>
