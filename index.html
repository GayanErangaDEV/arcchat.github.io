<!doctype html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>ARC Chat</title>
<link rel="icon" type="image/x-icon" href="gemini-svg (1).svg">
<link rel=stylesheet href=https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css>
<link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css>
<script src=https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js></script>
<style>body{background-color:#f0f5f7;font-family:sans-serif;height:100vh;margin:0}.connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#e0f2f1 0,#b2dfdb 100%)}.connect-screen h2{color:#006064;font-weight:700}.connect-screen .btn-primary{background-color:#00838f;border-color:#00838f}.connect-screen .btn-primary:hover{background-color:#006064;border-color:#006064}.app-container{display:none;height:100vh;width:100vw;background:#fff;margin:0}.sidebar{background:#004d40;color:#fff;border-right:1px solid #00332c;display:flex;flex-direction:column;height:100vh}.search-box{padding:15px;background:#004d40}.search-box input{background:#00796b;border:none;border-radius:5px;color:#fff;padding:8px 12px;width:100%;outline:0;font-size:14px}.search-box input::placeholder{color:#b2dfdb}.chat-list{flex:1;overflow-y:auto}.chat-item{padding:15px;border-bottom:1px solid #00332c;cursor:pointer;display:flex;align-items:center}.chat-item.active,.chat-item:hover{background:#00796b;text-decoration:none;color:#fff}.chat-item img{width:40px;height:40px;border-radius:50%;margin-right:12px}.chat-area{display:flex;flex-direction:column;background:#e0f2f1;background-image:url('https://www.transparenttextures.com/patterns/cubes.png');height:100vh}.chat-header{background:#004d40;color:#fff;padding:15px 20px;display:flex;align-items:center;border-bottom:1px solid #00332c;justify-content:space-between}.chat-header-info{display:flex;align-items:center}.chat-header img{width:40px;height:40px;border-radius:50%;margin-right:15px}.chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}.message{margin-bottom:15px;display:flex;flex-direction:column;max-width:70%;position:relative}.message.received{align-items:flex-start;align-self:flex-start}.message.sent{align-items:flex-end;align-self:flex-end}.bubble{padding:10px 15px;border-radius:12px;font-size:14px;color:#fff;word-wrap:break-word;position:re </head>
<body>
<div class=connect-screen id=connectScreen>
<h2 class=mb-3>ARC Chat</h2>
<button class="btn btn-primary btn-lg" onclick=connectWallet()><i class="fas fa-wallet mr-2"></i> Connect Wallet</button>
</div>
<div class="app-container row no-gutters" id=appScreen>
<div class="col-md-4 col-4 sidebar">
<div class=search-box>
<input id=searchAddressInput placeholder="Search Wallet Address + Enter..." onkeypress=handleSearch(event)>

</div>
<div class="col-md-8 col-8 chat-area" id=chatAreaContainer>
<div class=no-chat-selected id=noChatPlaceholder>

</div>
<div id=activeChatBox style=display:none;flex-direction:column;height:100%>

<div>

</div>
<div class=header-actions>

</div>
</div>
<div class=chat-body id=chatBody></div>
<div class=chat-footer>
<input id=messageInput placeholder="Write a message...">
<button class=send-btn id=sendBtn onclick=sendMessage()><i class="fas fa-paper-plane"></i></button>
</div>
</div>
</div>
</div>

</body>
</html>
