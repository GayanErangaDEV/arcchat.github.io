<!doctype html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>ARC Chat - Secure Messenger</title>
<link rel=stylesheet href=https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css>
<link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css>
<script src=https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js></script>
<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js" type="module"></script>
<style>
  :root {
    --bg-main:#0b1426; --bg-sidebar:#111b2e; --bg-input:#1e293b;
    --border:#1e293b; --border-mid:#334155;
    --accent:#38bdf8; --accent-hover:#0ea5e9;
    --text-primary:#f8fafc; --text-secondary:#94a3b8; --text-body:#e2e8f0;
    --bubble-received:#1e293b; --bubble-sent:#0284c7; --radius:18px;
  }
  * { box-sizing: border-box; }
  body { background:var(--bg-main); font-family:'Segoe UI',sans-serif; height:100vh; margin:0; overflow:hidden; color:var(--text-body); }

  /* ── CONNECT SCREEN ── */
  .connect-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#0b1426 0,#1e293b 100%); }
  .wallet-card { background:var(--bg-sidebar); padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.5); text-align:center; max-width:450px; width:100%; border:1px solid rgba(255,255,255,.1); }
  .brand-logo { font-size:50px; color:var(--accent); margin-bottom:15px; }
  .wallet-card h2 { color:var(--text-primary); font-weight:700; margin-bottom:10px; }
  .wallet-card p { color:var(--text-secondary); margin-bottom:24px; }
  .btn-connect { background:var(--accent); border:none; color:#0b1426; font-weight:600; padding:12px 30px; border-radius:50px; width:100%; transition:all .3s ease; cursor:pointer; font-size:16px; }
  .btn-connect:hover { background:var(--accent-hover); color:#fff; transform:translateY(-2px); }

  /* ── WALLET MODAL ── */
  .wallet-modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(6px); z-index:9999;
    align-items:center; justify-content:center;
  }
  .wallet-modal-overlay.open { display:flex; }
  .wallet-modal {
    background:#111b2e; border:1px solid #334155;
    border-radius:20px; padding:28px 24px; width:100%; max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6); animation:modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .wallet-modal h5 { color:var(--text-primary); font-weight:700; margin-bottom:6px; font-size:18px; }
  .wallet-modal p { color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
  .wallet-modal-close { float:right; background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer; margin-top:-4px; line-height:1; }
  .wallet-modal-close:hover { color:#fff; }
  .wallet-list { display:flex; flex-direction:column; gap:10px; }
  .wallet-option {
    display:flex; align-items:center; gap:14px;
    background:#1e293b; border:1px solid #334155;
    border-radius:14px; padding:14px 16px; cursor:pointer;
    transition:all 0.2s; color:var(--text-primary);
  }
  .wallet-option:hover { border-color:var(--accent); background:rgba(56,189,248,0.07); transform:translateX(3px); }
  .wallet-option img { width:36px; height:36px; border-radius:10px; object-fit:contain; flex-shrink:0; }
  .wallet-option-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .wallet-option-info { flex:1; }
  .wallet-option-name { font-size:14px; font-weight:600; }
  .wallet-option-desc { font-size:11px; color:var(--text-secondary); margin-top:1px; }
  .wallet-option-arrow { color:var(--text-secondary); font-size:13px; }
  .wallet-option:hover .wallet-option-arrow { color:var(--accent); }
  .wallet-option.detected { border-color:rgba(56,189,248,0.3); }
  .wallet-detected-badge {
    font-size:9px; background:rgba(56,189,248,0.15); color:var(--accent);
    border:1px solid rgba(56,189,248,0.3); border-radius:6px;
    padding:1px 6px; margin-left:6px; vertical-align:middle;
  }
  .wallet-divider { text-align:center; color:var(--text-secondary); font-size:11px; margin:6px 0; position:relative; }
  .wallet-divider::before, .wallet-divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:#334155; }
  .wallet-divider::before { left:0; }
  .wallet-divider::after { right:0; }
  .wallet-loading { text-align:center; padding:20px; color:var(--text-secondary); font-size:13px; }

  /* ── APP LAYOUT ── */
  .app-container { display:none; height:100vh; width:100vw; background:var(--bg-main); margin:0; }

  /* ── SIDEBAR ── */
  .sidebar { background:var(--bg-sidebar); color:#fff; border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; }
  .sidebar-header { padding:16px 15px 8px; background:var(--bg-sidebar); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .sidebar-header .brand-icon { font-size:22px; color:var(--accent); }
  .sidebar-header h6 { margin:0; font-weight:700; color:var(--text-primary); font-size:15px; }
  .search-box { padding:12px 15px; }
  .search-box input { background:var(--bg-input); border:1px solid var(--border-mid); border-radius:50px; color:#fff; padding:8px 16px; width:100%; outline:0; font-size:13px; }
  .search-box input::placeholder { color:var(--text-secondary); }
  .chat-list { flex:1; overflow-y:auto; }
  .chat-list::-webkit-scrollbar { width:4px; }
  .chat-list::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
  .chat-item { padding:12px 15px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; display:flex; align-items:center; color:var(--text-secondary); transition:background 0.2s; }
  .chat-item.active,.chat-item:hover { background:rgba(56,189,248,0.08); color:#fff; }
  .chat-item.active { border-left:3px solid var(--accent); }
  .chat-item img { width:42px; height:42px; border-radius:50%; margin-right:12px; border:2px solid var(--border-mid); flex-shrink:0; }
  .chat-item-info { flex:1; min-width:0; }
  .chat-item-name { font-size:13px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-item-addr { font-size:10px; color:var(--text-secondary); }
  .chat-item-time { font-size:10px; color:var(--text-secondary); white-space:nowrap; align-self:flex-start; margin-top:2px; }
  .btn-logout { background:rgba(109,40,217,0.3); color:var(--text-secondary); border:1px solid rgba(109,40,217,0.4); padding:10px; margin:10px; border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:13px; }
  .btn-logout:hover { background:#6d28d9; color:#fff; }

  /* ── CHAT AREA ── */
  .chat-area { display:flex; flex-direction:column; background:var(--bg-main); background-image:radial-gradient(circle at 20% 80%,rgba(56,189,248,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(2,132,199,0.03) 0%,transparent 50%); height:100vh; position:relative; }
  .chat-header { background:var(--bg-sidebar); color:#fff; padding:12px 20px; display:flex; align-items:center; border-bottom:1px solid var(--border); justify-content:space-between; flex-shrink:0; }
  .chat-header-info { display:flex; align-items:center; gap:12px; }
  .chat-header img { width:38px; height:38px; border-radius:50%; border:2px solid var(--accent); }
  .chat-header h5 { margin:0; font-size:14px; color:var(--text-primary); font-weight:600; }
  .chat-header small { font-size:11px; color:var(--text-secondary); }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .header-btn { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; color:var(--text-secondary); background:rgba(255,255,255,0.05); border:none; transition:all 0.2s; font-size:14px; }
  .header-btn.label-btn:hover { background:var(--accent); color:#0b1426; transform:scale(1.1); }
  .header-btn.delete-btn:hover { background:#ef4444; color:#fff; transform:scale(1.1); }
  .chat-body { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:4px; }
  .chat-body::-webkit-scrollbar { width:4px; }
  .chat-body::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
  .date-divider { text-align:center; margin:12px 0 8px; }
  .date-divider span { background:rgba(30,41,59,0.8); color:var(--text-secondary); font-size:11px; padding:4px 12px; border-radius:12px; border:1px solid var(--border-mid); }
  .message { margin-bottom:2px; display:flex; flex-direction:column; max-width:72%; position:relative; }
  .message.received { align-items:flex-start; align-self:flex-start; }
  .message.sent { align-items:flex-end; align-self:flex-end; }
  .bubble { padding:9px 14px; border-radius:var(--radius); font-size:14px; color:#fff; word-wrap:break-word; line-height:1.45; }
  .received .bubble { background:var(--bubble-received); border-top-left-radius:4px; border:1px solid var(--border-mid); }
  .sent .bubble { background:linear-gradient(135deg,#0284c7,#0369a1); border-top-right-radius:4px; }
  .bubble.emoji-only { font-size:28px; background:transparent !important; border:none !important; padding:4px 8px; }
  .msg-meta { display:flex; align-items:center; gap:6px; margin-top:3px; padding:0 4px; }
  .msg-time { font-size:10px; color:var(--text-secondary); white-space:nowrap; }
  .sent .msg-time { color:rgba(224,242,254,0.7); }
  .msg-edited { font-size:10px; color:var(--text-secondary); font-style:italic; }
  .msg-actions { display:none; gap:6px; margin-top:4px; padding:0 4px; }
  .message:hover .msg-actions { display:flex; }
  .msg-actions span { font-size:11px; color:var(--accent); cursor:pointer; padding:2px 8px; border-radius:10px; background:rgba(56,189,248,0.1); transition:all 0.2s; }
  .msg-actions span:hover { background:rgba(56,189,248,0.25); }
  .chat-footer { padding:10px 16px; background:var(--bg-sidebar); border-top:1px solid var(--border); display:flex; align-items:flex-end; gap:10px; flex-shrink:0; position:relative; }
  .footer-icon-btn { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size:18px; transition:all 0.2s; flex-shrink:0; }
  .footer-icon-btn:hover { color:var(--accent); background:rgba(56,189,248,0.1); }
  .footer-icon-btn.emoji-btn:hover { color:#f59e0b; }
  .input-wrap { flex:1; background:var(--bg-input); border:1px solid var(--border-mid); border-radius:22px; display:flex; align-items:center; padding:0 14px; min-height:42px; transition:border-color 0.2s; }
  .input-wrap:focus-within { border-color:var(--accent); }
  #messageInput { flex:1; background:transparent; border:none; color:#fff; outline:0; resize:none; font-size:14px; max-height:100px; overflow-y:auto; padding:10px 0; line-height:1.4; font-family:'Segoe UI',sans-serif; }
  #messageInput::placeholder { color:var(--text-secondary); }
  .send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-hover)); border:none; color:#0b1426; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; box-shadow:0 2px 8px rgba(56,189,248,0.3); }
  .send-btn:hover { transform:scale(1.1); }
  .send-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .emoji-picker-wrap { position:absolute; bottom:68px; left:60px; z-index:999; display:none; border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); border:1px solid var(--border-mid); }
  .emoji-picker-wrap.open { display:block; }
  emoji-picker { --background:#111b2e; --border-color:#334155; --category-font-color:#94a3b8; --input-border-color:#334155; --input-font-color:#e2e8f0; --input-placeholder-color:#64748b; --outline-color:#38bdf8; --indicator-color:#38bdf8; --button-hover-background:#1e293b; --emoji-size:1.4rem; --num-columns:8; height:360px; width:340px; }
  #noChatPlaceholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-secondary); gap:12px; }
  #noChatPlaceholder i { font-size:48px; color:var(--border-mid); }
  #noChatPlaceholder p { font-size:14px; }
  .sync-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; display:inline-block; margin-right:4px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .text-muted { color:var(--text-secondary)!important; }

  /* Connected wallet info in sidebar */
  .wallet-info-bar {
    padding:8px 14px; background:rgba(56,189,248,0.06);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px;
  }
  .wallet-info-bar img { width:20px; height:20px; border-radius:6px; }
  .wallet-info-bar span { font-size:11px; color:var(--text-secondary); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wallet-info-bar .wallet-tag { font-size:10px; background:rgba(56,189,248,0.15); color:var(--accent); padding:1px 7px; border-radius:8px; white-space:nowrap; }
</style>
</head>
<body>

<!-- Connect Screen -->
<div class=connect-screen id=connectScreen>
  <div class=wallet-card>
    <div class=brand-logo><i class="fas fa-comments"></i></div>
    <h2>ARC Chat</h2>
    <p>Connect any Web3 wallet to start secure, end-to-end blockchain conversations.</p>
    <button class="btn-connect" id=connectWalletBtn onclick=openWalletModal()>
      <i class="fas fa-wallet mr-2"></i> Connect Wallet
    </button>
    <div class="mt-3 text-muted" id=syncStatus style="font-size:11px">Checking Web3 provider...</div>
  </div>
</div>

<!-- Wallet Selector Modal -->
<div class="wallet-modal-overlay" id=walletModalOverlay onclick=closeWalletModalOnBg(event)>
  <div class=wallet-modal>
    <button class=wallet-modal-close onclick=closeWalletModal()>&times;</button>
    <h5>Connect Wallet</h5>
    <p>Choose your wallet to get started</p>
    <div class=wallet-list id=walletList>
      <div class=wallet-loading><i class="fas fa-spinner fa-spin mr-2"></i>Detecting wallets...</div>
    </div>
  </div>
</div>

<!-- App Screen -->
<div class="app-container row no-gutters" id=appScreen>
  <div class="col-md-4 col-4 sidebar">
    <div class=sidebar-header>
      <span class=brand-icon><i class="fas fa-comments"></i></span>
      <h6>ARC Chat</h6>
      <span class="ml-auto" style="font-size:11px;color:#94a3b8"><span class=sync-dot></span>Live</span>
    </div>
    <div class=wallet-info-bar id=walletInfoBar>
      <img id=connectedWalletIcon src="" alt="">
      <span id=connectedWalletAddr></span>
      <span class=wallet-tag id=connectedWalletName></span>
    </div>
    <div class=search-box>
      <input id=searchAddressInput placeholder="Search by address..." onkeypress=handleSearch(event)>
    </div>
    <div class=chat-list id=chatListContainer></div>
    <button class=btn-logout onclick=logout()><i class="fas fa-sign-out-alt mr-2"></i>Logout</button>
  </div>
  <div class="col-md-8 col-8 chat-area" id=chatAreaContainer>
    <div id=noChatPlaceholder>
      <i class="fas fa-comments"></i>
      <p>Select or search a user to start chatting</p>
    </div>
    <div id=activeChatBox style="display:none;flex-direction:column;height:100%">
      <div class=chat-header>
        <div class=chat-header-info>
          <img src="https://ui-avatars.com/api/?name=User&background=random" id=activeChatAvatar>
          <div>
            <h5 id=activeChatTitle>0x000...000</h5>
            <small id=activeChatSubtitle>End-to-End Blockchain Chat</small>
          </div>
        </div>
        <div class=header-actions>
          <button class="header-btn label-btn" id=labelChatBtn title="Set Wallet Label"><i class="fas fa-tag"></i></button>
          <button class="header-btn delete-btn" id=deleteChatBtn title="Close chat"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div class=chat-body id=chatBody></div>
      <div class="emoji-picker-wrap" id=emojiPickerWrap><emoji-picker id=emojiPicker></emoji-picker></div>
      <div class=chat-footer>
        <button class="footer-icon-btn emoji-btn" id=emojiToggleBtn><i class="far fa-smile"></i></button>
        <div class=input-wrap>
          <textarea id=messageInput placeholder="Write a message..." rows="1"></textarea>
        </div>
        <button class=send-btn id=sendBtn onclick=sendMessage()><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────
const ARC_CHAIN_ID_DECIMAL = 5042002;
const CONTRACT_ADDRESS = "0xfabD9624E0e46437D67d9601D4021cA9571BEE24";
const contractABI = [
  "function sendMessage(address _receiver, string _content) public",
  "function getMessagesWith(address _otherPerson) public view returns (tuple(uint256 id, address sender, address receiver, string content, uint256 timestamp, bool isEdited, bool isDeleted)[] memory)",
  "function editMessage(uint256 _id, string _newContent) public",
  "function deleteMessage(uint256 _id) public",
  "function setWalletLabel(address _wallet, string _label) public",
  "function removeWalletLabel(address _wallet) public",
  "function getWalletLabel(address _user, address _wallet) public view returns (string memory)",
  "function getUserChatList(address _user) public view returns (tuple(address walletAddress, uint256 lastMessageTimestamp)[] memory)"
];
const RPC_URLS = ["https://rpc.testnet.arc.network","https://arc-testnet.drpc.org"];

// ─── State ────────────────────────────────────────────────────
let provider, signer, contract, contractWithSigner;
let userAccount, activeChatUser = null;
let loadedMessageIds = new Set();
let globalSyncInterval = null;
let activeRpcUrl = RPC_URLS[0];
let activeWalletProvider = null; // the actual injected provider (could be MetaMask, OKX, etc.)
let detectedWallets = [];        // EIP-6963 discovered wallets

// ─── EIP-6963 Wallet Discovery ────────────────────────────────
// Collects all wallets that announce themselves via EIP-6963
function discoverWallets() {
  return new Promise(resolve => {
    const found = [];
    const seen = new Set();

    const handler = (e) => {
      const { info, provider } = e.detail;
      if (!seen.has(info.rdns)) {
        seen.add(info.rdns);
        found.push({ info, provider });
      }
    };
    window.addEventListener('eip6963:announceProvider', handler);
    window.dispatchEvent(new Event('eip6963:requestProvider'));

    // Give wallets 600ms to respond
    setTimeout(() => {
      window.removeEventListener('eip6963:announceProvider', handler);
      resolve(found);
    }, 600);
  });
}

// Known wallet metadata (fallback icons + descriptions for window.ethereum wallets)
const KNOWN_WALLETS = {
  'io.metamask':      { name:'MetaMask',        icon:'https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg',       desc:'Most popular browser wallet' },
  'com.okex.wallet':  { name:'OKX Wallet',       icon:'https://static.okx.com/cdn/assets/imgs/247/58E63FEA47A2B7D7.png',           desc:'OKX multi-chain wallet' },
  'com.coinbase.wallet':{ name:'Coinbase Wallet', icon:'https://www.coinbase.com/assets/favicon/apple-touch-icon.png',               desc:'Coinbase self-custody wallet' },
  'com.brave.wallet': { name:'Brave Wallet',     icon:'https://brave.com/static-assets/images/brave-logo-sans-text.svg',            desc:'Built into Brave Browser' },
  'io.rabby':         { name:'Rabby Wallet',     icon:'https://rabby.io/favicon.png',                                               desc:'DeFi-friendly browser wallet' },
  'xyz.frontier.wallet':{ name:'Frontier',       icon:'https://frontier.xyz/favicon.ico',                                           desc:'Multi-chain crypto wallet' },
  'app.phantom':      { name:'Phantom',          icon:'https://phantom.app/favicon.ico',                                            desc:'Solana + EVM wallet' },
};

function getWalletMeta(rdns) {
  return KNOWN_WALLETS[rdns] || null;
}

// ─── Wallet Modal ─────────────────────────────────────────────
async function openWalletModal() {
  document.getElementById('walletModalOverlay').classList.add('open');
  const listEl = document.getElementById('walletList');
  listEl.innerHTML = '<div class="wallet-loading"><i class="fas fa-spinner fa-spin mr-2"></i>Detecting wallets...</div>';

  // Discover EIP-6963 wallets
  const eip6963 = await discoverWallets();
  detectedWallets = eip6963;

  let html = '';

  if (eip6963.length > 0) {
    html += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;padding:0 2px;">Detected on your browser</div>`;
    eip6963.forEach((w, i) => {
      const meta = getWalletMeta(w.info.rdns);
      const iconHtml = w.info.icon
        ? `<img src="${w.info.icon}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="wallet-option-icon" style="display:none;background:#1e293b"><i class="fas fa-wallet" style="color:var(--accent)"></i></div>`
        : `<div class="wallet-option-icon" style="background:#1e293b"><i class="fas fa-wallet" style="color:var(--accent)"></i></div>`;

      html += `
        <div class="wallet-option detected" onclick="connectWithWallet('eip6963',${i})">
          ${iconHtml}
          <div class="wallet-option-info">
            <div class="wallet-option-name">${w.info.name} <span class="wallet-detected-badge">Detected</span></div>
            <div class="wallet-option-desc">${meta ? meta.desc : 'Browser extension wallet'}</div>
          </div>
          <i class="fas fa-chevron-right wallet-option-arrow"></i>
        </div>`;
    });
  }

  // Fallback: window.ethereum (legacy) if not already shown via EIP-6963
  if (window.ethereum && eip6963.length === 0) {
    html += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;padding:0 2px;">Available</div>`;
    html += `
      <div class="wallet-option detected" onclick="connectWithWallet('legacy')">
        <div class="wallet-option-icon" style="background:#f97316;color:#fff"><i class="fas fa-wallet"></i></div>
        <div class="wallet-option-info">
          <div class="wallet-option-name">Browser Wallet <span class="wallet-detected-badge">Detected</span></div>
          <div class="wallet-option-desc">MetaMask, OKX or any injected wallet</div>
        </div>
        <i class="fas fa-chevron-right wallet-option-arrow"></i>
      </div>`;
  }

  // Show install options if nothing detected
  if (eip6963.length === 0 && !window.ethereum) {
    html += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;padding:0 2px;text-align:center;">No wallet detected — install one below</div>`;
  }

  // Always show install links for popular wallets not detected
  const detectedRdns = new Set(eip6963.map(w => w.info.rdns));
  const popularWallets = [
    { rdns:'io.metamask', name:'MetaMask', desc:'Most popular browser wallet', color:'#f97316', icon:'fas fa-fox', installUrl:'https://metamask.io/download/' },
    { rdns:'com.okex.wallet', name:'OKX Wallet', desc:'OKX multi-chain wallet', color:'#000', icon:'fas fa-wallet', installUrl:'https://www.okx.com/web3' },
    { rdns:'com.coinbase.wallet', name:'Coinbase Wallet', desc:'Coinbase self-custody wallet', color:'#1652f0', icon:'fas fa-wallet', installUrl:'https://www.coinbase.com/wallet/downloads' },
  ];
  const notInstalled = popularWallets.filter(w => !detectedRdns.has(w.rdns));
  if (notInstalled.length > 0 && eip6963.length > 0) {
    html += `<div class="wallet-divider">or install</div>`;
  }
  notInstalled.forEach(w => {
    html += `
      <div class="wallet-option" onclick="window.open('${w.installUrl}','_blank')" style="opacity:0.7">
        <div class="wallet-option-icon" style="background:${w.color};color:#fff"><i class="${w.icon}"></i></div>
        <div class="wallet-option-info">
          <div class="wallet-option-name">${w.name}</div>
          <div class="wallet-option-desc">${w.desc}</div>
        </div>
        <i class="fas fa-external-link-alt wallet-option-arrow" style="font-size:11px"></i>
      </div>`;
  });

  listEl.innerHTML = html || '<div class="wallet-loading" style="color:#ef4444">No wallets found. Please install MetaMask or OKX Wallet.</div>';
}

function closeWalletModal() {
  document.getElementById('walletModalOverlay').classList.remove('open');
}
function closeWalletModalOnBg(e) {
  if (e.target === document.getElementById('walletModalOverlay')) closeWalletModal();
}

// ─── Connect with selected wallet ────────────────────────────
async function connectWithWallet(type, index) {
  closeWalletModal();
  const btn = document.getElementById('connectWalletBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Connecting...';

  try {
    let walletProvider;
    let walletName = 'Wallet';
    let walletIcon = '';

    if (type === 'eip6963') {
      const w = detectedWallets[index];
      walletProvider = w.provider;
      walletName = w.info.name;
      walletIcon = w.info.icon || '';
    } else {
      // Legacy window.ethereum
      walletProvider = window.ethereum;
      walletName = 'Browser Wallet';
    }

    activeWalletProvider = walletProvider;

    const accounts = await walletProvider.request({ method: 'eth_requestAccounts' });
    userAccount = accounts[0];

    // Set provider for ethers
    provider = new ethers.providers.Web3Provider(walletProvider);

    await ensureArcNetwork(walletProvider);

    // Update sidebar wallet info bar
    document.getElementById('connectedWalletIcon').src = walletIcon || 'https://ui-avatars.com/api/?name=W&background=0284c7&color=fff&size=20';
    document.getElementById('connectedWalletAddr').textContent = userAccount.substring(0,6) + '...' + userAccount.substring(38);
    document.getElementById('connectedWalletName').textContent = walletName;

    await initApp();

    // Listen for account/chain changes on THIS provider
    if (!walletProvider._arcListenersSet) {
      walletProvider.on('accountsChanged', () => window.location.reload());
      walletProvider.on('chainChanged', () => window.location.reload());
      walletProvider._arcListenersSet = true;
    }
  } catch (e) {
    console.error(e);
    alert("Wallet connection rejected or failed. Please try again.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-wallet mr-2"></i>Connect Wallet';
  }
}

// ─── Network ─────────────────────────────────────────────────
async function getBestRpcUrl() {
  try {
    const checks = RPC_URLS.map(async url => {
      const t = Date.now();
      try {
        const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'net_version',params:[],id:1}),signal:AbortSignal.timeout(2000)});
        if(r.ok) return {url,latency:Date.now()-t};
      } catch {}
      return {url,latency:Infinity};
    });
    const res = (await Promise.all(checks)).sort((a,b)=>a.latency-b.latency);
    return res[0].latency !== Infinity ? res[0].url : RPC_URLS[0];
  } catch { return RPC_URLS[0]; }
}

async function ensureArcNetwork(walletProv) {
  const wp = walletProv || activeWalletProvider || window.ethereum;
  const hexId = "0x" + ARC_CHAIN_ID_DECIMAL.toString(16);
  try {
    await wp.request({method:'wallet_switchEthereumChain',params:[{chainId:hexId}]});
  } catch(e) {
    if(e.code!==4902) throw e;
    await wp.request({method:'wallet_addEthereumChain',params:[{chainId:hexId,chainName:'ARC Testnet',rpcUrls:[activeRpcUrl],nativeCurrency:{name:'ARC',symbol:'ARC',decimals:18},blockExplorerUrls:['https://testnet.arcscan.app']}]});
  }
  provider = new ethers.providers.Web3Provider(wp);
  signer = provider.getSigner();
  contractWithSigner = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
}

// ─── App Init ────────────────────────────────────────────────
async function initApp() {
  try {
    signer = provider.getSigner();
    activeRpcUrl = await getBestRpcUrl();
    const rpcProvider = new ethers.providers.JsonRpcProvider(activeRpcUrl);
    contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, rpcProvider);
    contractWithSigner = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
    $("#connectScreen").hide();
    $("#appScreen").css("display","flex");
    await loadChatHistory();
    startGlobalSync();
  } catch(e) { console.error("Init failed:",e); }
}

function logout() {
  userAccount=null; activeChatUser=null; activeWalletProvider=null;
  loadedMessageIds.clear();
  if(globalSyncInterval){clearInterval(globalSyncInterval);globalSyncInterval=null;}
  $("#appScreen").hide(); $("#connectScreen").show();
  $("#chatListContainer").html(""); $("#activeChatBox").hide(); $("#noChatPlaceholder").show();
}

function startGlobalSync() {
  if(globalSyncInterval) clearInterval(globalSyncInterval);
  globalSyncInterval = setInterval(async()=>{
    if(!userAccount) return;
    try{ await loadChatHistory(true); if(activeChatUser) await loadMessages(); }
    catch(e){ console.warn("Sync:",e); }
  }, 2500);
}

// ─── Helpers ─────────────────────────────────────────────────
setInterval(()=>{ $(".msg-time[data-ts]").each(function(){ $(this).text(formatTime(parseInt($(this).attr("data-ts")))); }); },60000);

function formatTime(unix) {
  const m = moment.unix(unix), diff = moment().diff(m,'minutes');
  if(diff<1) return 'just now';
  if(diff<60) return m.fromNow();
  if(diff<1440) return m.format('h:mm A');
  if(diff<2880) return 'Yesterday '+m.format('h:mm A');
  if(diff<43200) return m.fromNow();
  return m.format('MMM D, YYYY');
}
function formatDateDivider(unix) {
  const m=moment.unix(unix),today=moment().startOf('day'),yest=moment().subtract(1,'days').startOf('day');
  if(m.isSameOrAfter(today)) return 'Today';
  if(m.isSameOrAfter(yest)) return 'Yesterday';
  if(m.isAfter(moment().subtract(7,'days'))) return m.format('dddd');
  return m.format('MMMM D, YYYY');
}
function isOnlyEmoji(str) { return /^(\p{Emoji_Presentation}|\p{Extended_Pictographic}|\uFE0F|\u200D|\s){1,6}$/u.test(str.trim()); }
function autoGrow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

async function getOnChainWalletLabel(addr) {
  try { const l=await contract.getWalletLabel(userAccount,addr); return l&&l.trim()!==''?l:null; } catch { return null; }
}

// ─── Chat List ────────────────────────────────────────────────
async function loadChatHistory(silent=false) {
  const container=$("#chatListContainer");
  try {
    const list=await contract.getUserChatList(userAccount);
    if(!list||list.length===0){container.html('<p class="text-center text-muted mt-4" style="font-size:12px;padding:0 15px;">Search an address to start a chat</p>');return;}
    const sorted=[...list].sort((a,b)=>b.lastMessageTimestamp.toNumber()-a.lastMessageTimestamp.toNumber());
    let html='';
    for(const item of sorted){
      const addr=item.walletAddress,ts=item.lastMessageTimestamp.toNumber();
      const label=await getOnChainWalletLabel(addr);
      const isActive=activeChatUser&&activeChatUser.toLowerCase()===addr.toLowerCase()?'active':'';
      const short=`${addr.substring(0,6)}...${addr.substring(38)}`;
      const displayName=label||short;
      html+=`<div class="chat-item ${isActive}" data-address="${addr}">
        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=random" alt="">
        <div class="chat-item-info">
          <div class="chat-item-name">${label||`<strong>${short}</strong>`}</div>
          ${label?`<div class="chat-item-addr">${short}</div>`:''}
        </div>
        <div class="chat-item-time">${moment.unix(ts).fromNow()}</div>
      </div>`;
    }
    container.html(html);
  } catch(e){console.error("Chat history error:",e);}
}

function handleSearch(e) {
  if(e.key!=='Enter') return;
  const addr=$("#searchAddressInput").val().trim();
  if(!ethers.utils.isAddress(addr)) return alert("Invalid Address!");
  if(addr.toLowerCase()===userAccount.toLowerCase()) return alert("You cannot chat with yourself!");
  openConversation(addr); $("#searchAddressInput").val('');
}

async function openConversation(addr) {
  activeChatUser=addr; loadedMessageIds.clear();
  const label=await getOnChainWalletLabel(addr);
  const short=`${addr.substring(0,6)}...${addr.substring(38)}`;
  $("#noChatPlaceholder").hide(); $("#activeChatBox").css("display","flex");
  if(label){$("#activeChatTitle").text(label);$("#activeChatSubtitle").text(addr);}
  else{$("#activeChatTitle").text(short);$("#activeChatSubtitle").text("End-to-End Blockchain Chat");}
  $("#activeChatAvatar").attr("src",`https://ui-avatars.com/api/?name=${encodeURIComponent(label||addr)}&background=random`);
  $("#chatBody").html('<p class="text-center text-muted placeholder-loading" style="margin-top:20px;font-size:13px;">Loading messages...</p>');
  document.getElementById('emojiPickerWrap')?.classList.remove('open');
  await loadMessages(); $("#messageInput").focus();
}

async function loadMessages() {
  if(!activeChatUser) return;
  try {
    const msgs=await contractWithSigner.getMessagesWith(activeChatUser);
    $(".placeholder-loading").remove();
    if(msgs.length===0&&loadedMessageIds.size===0){$("#chatBody").html('<p class="text-center text-muted no-msg-notice" style="margin-top:20px;font-size:13px;">No messages yet. Say hi! 👋</p>');return;}
    let scrollToBottom=false,lastDateLabel=null;
    msgs.forEach(msg=>{
      const id=msg.id.toString();
      if(msg.isDeleted){$(`[data-id="${id}"]`).closest('.message-wrap').remove();loadedMessageIds.delete(id);return;}
      const isSent=msg.sender.toLowerCase()===userAccount.toLowerCase();
      const type=isSent?'sent':'received',ts=msg.timestamp.toNumber();
      const timeStr=formatTime(ts),dateLabel=formatDateDivider(ts),emojiOnly=isOnlyEmoji(msg.content);
      if(loadedMessageIds.has(id)){
        const bubble=$(`[data-id="${id}"] .bubble div:first-child`);
        if(bubble.text()!==msg.content){bubble.text(msg.content);$(`[data-id="${id}"] .msg-time`).attr('data-ts',ts).text(timeStr);if(msg.isEdited)$(`[data-id="${id}"] .msg-edited`).show();}
        return;
      }
      $(".no-msg-notice").remove();
      if(dateLabel!==lastDateLabel){lastDateLabel=dateLabel;$("#chatBody").append(`<div class="date-divider"><span>${dateLabel}</span></div>`);}
      const actionsHtml=isSent?`<div class="msg-actions"><span class="edit-action-btn"><i class="fas fa-edit"></i> Edit</span><span class="delete-action-btn"><i class="fas fa-trash"></i> Delete</span></div>`:'';
      const wrap=$(`<div class="message-wrap" data-id="${id}"><div class="message ${type}"><div class="bubble ${emojiOnly?'emoji-only':''}"><div></div><div class="msg-meta"><span class="msg-time" data-ts="${ts}">${timeStr}</span>${msg.isEdited?'<span class="msg-edited">· edited</span>':'<span class="msg-edited" style="display:none">· edited</span>'}</div></div>${actionsHtml}</div></div>`);
      wrap.find('.bubble div:first-child').text(msg.content);
      $("#chatBody").append(wrap); loadedMessageIds.add(id); scrollToBottom=true;
    });
    if(scrollToBottom){setTimeout(()=>{const cb=document.getElementById('chatBody');if(cb)cb.scrollTop=cb.scrollHeight;},60);}
  } catch(e){console.error("Message fetch:",e);}
}

async function sendMessage() {
  const input=$("#messageInput"),btn=$("#sendBtn"),text=input.val().trim();
  if(!text||!activeChatUser) return;
  try {
    input.prop("disabled",true); btn.html('<i class="fas fa-spinner fa-spin"></i>').prop("disabled",true);
    const currentChain=(await activeWalletProvider.request({method:'eth_chainId'})).toLowerCase();
    if(currentChain!=="0x"+ARC_CHAIN_ID_DECIMAL.toString(16)) await ensureArcNetwork();
    const tx=await contractWithSigner.sendMessage(activeChatUser,text);
    await tx.wait(); input.val(''); autoGrow(input[0]);
    document.getElementById('emojiPickerWrap')?.classList.remove('open');
    await loadChatHistory(); await loadMessages();
  } catch(e){console.error(e);alert("Transaction failed or canceled.");}
  finally{input.prop("disabled",false);btn.html('<i class="fas fa-paper-plane"></i>').prop("disabled",false);input.focus();}
}

// ─── Auto-session restore ─────────────────────────────────────
$(document).ready(async function(){
  // Try to silently restore session from EIP-6963 wallets
  activeRpcUrl = await getBestRpcUrl();
  try {
    const eip6963 = await discoverWallets();
    for(const w of eip6963){
      try{
        const accounts = await w.provider.request({method:'eth_accounts'}); // no popup
        if(accounts&&accounts.length>0){
          userAccount=accounts[0]; activeWalletProvider=w.provider;
          provider=new ethers.providers.Web3Provider(w.provider);
          document.getElementById('connectedWalletIcon').src=w.info.icon||'';
          document.getElementById('connectedWalletAddr').textContent=userAccount.substring(0,6)+'...'+userAccount.substring(38);
          document.getElementById('connectedWalletName').textContent=w.info.name;
          $("#syncStatus").html('<i class="fas fa-spinner fa-spin"></i> Restoring session...');
          await ensureArcNetwork(w.provider);
          await initApp();
          if(!w.provider._arcListenersSet){w.provider.on('accountsChanged',()=>window.location.reload());w.provider.on('chainChanged',()=>window.location.reload());w.provider._arcListenersSet=true;}
          return;
        }
      }catch{}
    }
    // Fallback legacy window.ethereum
    if(window.ethereum){
      const accounts=await window.ethereum.request({method:'eth_accounts'});
      if(accounts&&accounts.length>0){
        userAccount=accounts[0]; activeWalletProvider=window.ethereum;
        provider=new ethers.providers.Web3Provider(window.ethereum);
        document.getElementById('connectedWalletAddr').textContent=userAccount.substring(0,6)+'...'+userAccount.substring(38);
        document.getElementById('connectedWalletName').textContent='Browser Wallet';
        await ensureArcNetwork(); await initApp();
        return;
      }
    }
  } catch(e){console.error("Session restore:",e);}
  $("#syncStatus").text("Connect your wallet to continue.");
});

// ─── Emoji Picker ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const picker=document.getElementById('emojiPicker');
  if(picker){picker.addEventListener('emoji-click',e=>{
    const ta=document.getElementById('messageInput'),emoji=e.detail.unicode;
    const s=ta.selectionStart,end=ta.selectionEnd,v=ta.value;
    ta.value=v.slice(0,s)+emoji+v.slice(end); ta.selectionStart=ta.selectionEnd=s+emoji.length;
    ta.focus(); autoGrow(ta);
  });}
  const emojiBtn=document.getElementById('emojiToggleBtn'),pickerWrap=document.getElementById('emojiPickerWrap');
  if(emojiBtn&&pickerWrap){emojiBtn.addEventListener('click',e=>{e.stopPropagation();pickerWrap.classList.toggle('open');});}
  document.addEventListener('click',e=>{const w=document.getElementById('emojiPickerWrap');if(w&&!w.contains(e.target)&&e.target.id!=='emojiToggleBtn')w.classList.remove('open');});
  const ta=document.getElementById('messageInput');
  if(ta){ta.addEventListener('input',()=>autoGrow(ta));ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});}
});

// ─── Delegated Events ─────────────────────────────────────────
$(document).on("click","#labelChatBtn",async function(){
  if(!activeChatUser) return;
  const cur=await getOnChainWalletLabel(activeChatUser)||'';
  const newLabel=prompt("Enter a name/label (empty to remove):",cur);
  if(newLabel===null) return;
  try{
    $(this).html('<i class="fas fa-spinner fa-spin"></i>');
    const tx=newLabel.trim()===''?await contractWithSigner.removeWalletLabel(activeChatUser):await contractWithSigner.setWalletLabel(activeChatUser,newLabel.trim());
    await tx.wait(); await loadChatHistory(); await openConversation(activeChatUser);
  }catch(e){console.error(e);alert("Transaction failed!");}
  finally{$(this).html('<i class="fas fa-tag"></i>');}
});
$(document).on("click","#deleteChatBtn",function(){
  if(activeChatUser&&confirm("Close this chat view?")){activeChatUser=null;loadedMessageIds.clear();$("#activeChatBox").hide();$("#noChatPlaceholder").show();loadChatHistory();}
});
$(document).on("click",".edit-action-btn",function(){
  const id=$(this).closest(".message-wrap").data("id"),newText=prompt("Edit message:");
  if(newText&&newText.trim()){contractWithSigner.editMessage(id,newText.trim()).then(tx=>tx.wait()).then(()=>loadMessages()).catch(e=>console.error(e));}
});
$(document).on("click",".delete-action-btn",function(){
  const id=$(this).closest(".message-wrap").data("id");
  if(confirm("Delete this message?")){contractWithSigner.deleteMessage(id).then(tx=>tx.wait()).then(()=>loadMessages()).catch(e=>console.error(e));}
});
$(document).on("click",".chat-list .chat-item",function(){ openConversation($(this).data("address")); });
</script>
