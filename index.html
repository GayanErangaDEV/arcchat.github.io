<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Chat - Secure Messenger</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <style>
        body { background-color: #f0f5f7; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        .connect-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%); }
        .wallet-card { background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 77, 64, 0.1); text-align: center; max-width: 450px; width: 100%; }
        .app-container { display: none; height: 100vh; width: 100vw; background: #fff; }
        .sidebar { background: #004d40; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .chat-area { display: flex; flex-direction: column; background: #e0f2f1; height: 100vh; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; max-width: 70%; }
        .message.received { align-self: flex-start; }
        .message.sent { align-self: flex-end; }
        .bubble { padding: 10px 15px; border-radius: 12px; font-size: 14px; color: #fff; }
        .received .bubble { background: #00796b; }
        .sent .bubble { background: #004d40; }
        .msg-actions { font-size: 10px; color: #00796b; cursor: pointer; display: flex; gap: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="connect-screen" id="connectScreen">
    <div class="wallet-card">
        <h2>ARC Chat</h2>
        <button class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
    </div>
</div>

<div class="app-container row no-gutters" id="appScreen">
    <div class="col-4 sidebar">
        <div class="search-box p-3"><input id="searchAddressInput" placeholder="Search Address..." onkeypress="handleSearch(event)"></div>
        <div id="chatListContainer"></div>
    </div>
    <div class="col-8 chat-area">
        <div id="activeChatBox" style="display:none; flex-direction:column; height:100%">
            <div class="chat-body" id="chatBody"></div>
            <div class="chat-footer p-3">
                <input id="messageInput" placeholder="Message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
const CONTRACT_ADDRESS = "0xfabD9624E0e46437D67d9601D4021cA9571BEE24";
const contractABI = ["function sendMessage(address _receiver, string _content) public", "function getMessagesWith(address _otherPerson) public view returns (tuple(uint256 id, address sender, address receiver, string content, uint256 timestamp, bool isEdited, bool isDeleted)[])", "function deleteMessage(uint256 _id) public"];

let provider, contract, userAccount, activeChatUser = null;

async function connectWallet() {
    try {
        const accounts = await window.ethereum.request({method: "eth_requestAccounts"});
        userAccount = accounts[0];
        provider = new ethers.providers.Web3Provider(window.ethereum);
        contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, provider.getSigner());
        $("#connectScreen").hide();
        $("#appScreen").show();
    } catch (e) { alert("Wallet connection failed!"); }
}

async function loadMessages() {
    if (!activeChatUser) return;
    try {
        const messages = await contract.getMessagesWith(activeChatUser);
        $("#chatBody").empty();
        
        messages.forEach(msg => {
            // බ්ලොක්චේන් එකෙන් isDeleted = true නම් එය UI එකට ඇතුළත් නොකරයි
            if (msg.isDeleted) return; 

            const isSent = msg.sender.toLowerCase() === userAccount.toLowerCase();
            const msgDiv = $(`
                <div class="message ${isSent ? 'sent' : 'received'}" data-id="${msg.id}">
                    <div class="bubble">${msg.content}</div>
                    ${isSent ? '<div class="msg-actions"><span class="delete-action-btn">Delete</span></div>' : ''}
                </div>
            `);
            $("#chatBody").append(msgDiv);
        });
    } catch(err) { console.error(err); }
}

// පණිවිඩය මකා දැමීම - යාවත්කාලීන කළ ක්‍රියාවලිය
$(document).on("click", ".delete-action-btn", async function() {
    const messageElement = $(this).closest(".message");
    const id = messageElement.data("id");
    
    if (confirm("Delete this message from Blockchain?")) {
        try {
            // UI එකෙන් වහාම ඉවත් කිරීම
            messageElement.fadeOut(300, function() { $(this).remove(); });
            
            // Smart Contract එකේ deleteMessage ඇමතීම
            const tx = await contract.deleteMessage(id);
            await tx.wait(); // බ්ලොක්චේන් එකේ ස්ථිර වන තෙක් සිටීම
            
            console.log("Deleted from Blockchain successfully");
            await loadMessages(); // දත්ත නිවැරදි බව සහතික කිරීමට නැවත පූරණය කරන්න
        } catch (err) {
            console.error("Delete error:", err);
            alert("Error deleting message!");
            loadMessages(); // දෝෂයක් වුවහොත් නැවත පූරණය කරන්න
        }
    }
});

function handleSearch(e) {
    if (e.key === "Enter") {
        activeChatUser = $("#searchAddressInput").val();
        $("#activeChatBox").show();
        loadMessages();
    }
}
</script>
</body>
</html>
