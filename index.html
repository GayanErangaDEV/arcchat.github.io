<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ARC Chat - Secure Messenger</title><link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script><style>body{background-color:#f0f5f7;font-family:'Segoe UI',sans-serif;height:100vh;margin:0;overflow:hidden}.connect-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#e0f2f1 0,#b2dfdb 100%)}.wallet-card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,77,64,.1);text-align:center;max-width:450px;width:100%;border:1px solid rgba(0,121,107,.1)}.btn-connect{background-color:#00796b;border-color:#00796b;color:#fff;font-weight:600;padding:12px 30px;border-radius:50px;width:100%}.app-container{display:none;height:100vh;width:100vw;background:#fff}.sidebar{background:#004d40;color:#fff;height:100vh;display:flex;flex-direction:column}.chat-list{flex:1;overflow-y:auto}.chat-item{padding:15px;border-bottom:1px solid #00332c;cursor:pointer;color:#fff}.chat-item:hover{background:#00796b}.sidebar-footer{padding:15px;background:#00332c}.btn-logout{background-color:#e57373;border:none;color:#fff;padding:10px;border-radius:8px;width:100%}.chat-area{display:flex;flex-direction:column;background:#e0f2f1;height:100vh}.chat-body{flex:1;overflow-y:auto;padding:20px}.message{margin-bottom:15px;display:flex;flex-direction:column;max-width:70%}.received{align-self:flex-start}.sent{align-self:flex-end}.bubble{padding:10px;border-radius:12px;color:#fff}.received .bubble{background:#00796b}.sent .bubble{background:#004d40}.chat-footer{padding:15px;background:#004d40;display:flex}</style></head><body><div class="connect-screen" id="connectScreen"><div class="wallet-card"><h2>ARC Chat</h2><button class="btn btn-connect" onclick="connectWallet()">Connect Wallet</button><div id="syncStatus" class="mt-2"></div></div></div><div class="app-container row no-gutters" id="appScreen"><div class="col-md-4 col-4 sidebar"><div class="p-3"><input id="searchAddressInput" class="form-control" placeholder="Wallet Address..." onkeypress="handleSearch(event)"></div><div class="chat-list" id="chatListContainer"></div><div class="sidebar-footer"><button class="btn-logout" onclick="logoutWallet()">Logout</button></div></div><div class="col-md-8 col-8 chat-area"><div id="noChatPlaceholder" class="m-auto">Select a user to chat</div><div id="activeChatBox" style="display:none;flex-direction:column;height:100%"><div class="p-3 bg-dark text-white" id="activeChatTitle">Chat</div><div class="chat-body" id="chatBody"></div><div class="chat-footer"><input id="messageInput" class="form-control" placeholder="Message..."><button class="btn btn-light ml-2" onclick="sendMessage()">Send</button></div></div></div></div><script>const CONTRACT_ADDRESS = "0xfabD9624E0e46437D67d9601D4021cA9571BEE24";
const contractABI = ["function sendMessage(address _receiver, string _content) public", "function getMessagesWith(address _otherPerson) public view returns (tuple(uint256 id, address sender, address receiver, string content, uint256 timestamp, bool isEdited, bool isDeleted)[])", "function getUserChatList(address _user) public view returns (tuple(address walletAddress, uint256 lastMessageTimestamp)[])"];

let provider, signer, contract, userAccount, activeChatUser = null, globalSyncInterval = null;

async function initApp() {
    signer = provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
    $("#connectScreen").hide();
    $("#appScreen").css("display", "flex");
    await loadChatHistory();
    if(globalSyncInterval) clearInterval(globalSyncInterval);
    globalSyncInterval = setInterval(async() => { if(activeChatUser) await loadMessages(); }, 5000);
}

$(document).ready(async function() {
    if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.listAccounts();
        if (accounts.length > 0) {
            userAccount = accounts[0];
            await initApp();
        }
    }
});

async function connectWallet() {
    try {
        const accounts = await window.ethereum.request({method: "eth_requestAccounts"});
        userAccount = accounts[0];
        await initApp();
    } catch(e) { console.error(e); }
}

async function loadChatHistory() {
    const list = await contract.getUserChatList(userAccount);
    $("#chatListContainer").empty();
    list.forEach(item => {
        $("#chatListContainer").append(`<div class="chat-item" onclick="openConversation('${item.walletAddress}')">${item.walletAddress.substring(0,10)}...</div>`);
    });
}

function handleSearch(e) {
    if(e.key === "Enter") {
        let addr = $("#searchAddressInput").val().trim();
        if(ethers.utils.isAddress(addr)) openConversation(addr);
    }
}

async function openConversation(addr) {
    activeChatUser = addr;
    $("#noChatPlaceholder").hide();
    $("#activeChatBox").css("display", "flex");
    $("#activeChatTitle").text("Chat with: " + addr.substring(0,10) + "...");
    await loadMessages();
}

async function loadMessages() {
    const msgs = await contract.getMessagesWith(activeChatUser);
    $("#chatBody").empty();
    msgs.forEach(msg => {
        const type = msg.sender.toLowerCase() === userAccount.toLowerCase() ? "sent" : "received";
        $("#chatBody").append(`<div class="message ${type}"><div class="bubble">${msg.content}</div></div>`);
    });
}

async function sendMessage() {
    const content = $("#messageInput").val();
    if(content && activeChatUser) {
        const tx = await contract.sendMessage(activeChatUser, content);
        await tx.wait();
        $("#messageInput").val("");
        await loadMessages();
    }
}

function logoutWallet() {
    if(confirm("Logout?")) {
        // සියලුම session දත්ත මකා පිටුව Reload කිරීම
        userAccount = null;
        activeChatUser = null;
        window.location.reload(); 
    }
}</script></body></html>
