<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ARC Chat - Secure Messenger</title><link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script><style>body{background-color:#f0f5f7;font-family:'Segoe UI',sans-serif;height:100vh;margin:0;overflow:hidden}.connect-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#e0f2f1 0,#b2dfdb 100%)}.wallet-card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,77,64,.1);text-align:center;max-width:450px;width:100%;border:1px solid rgba(0,121,107,.1)}.brand-logo{font-size:50px;color:#004d40;margin-bottom:15px}.wallet-card h2{color:#004d40;font-weight:700;margin-bottom:10px}.wallet-card p{color:#00796b;font-size:14px;margin-bottom:30px}.btn-connect{background-color:#00796b;border-color:#00796b;color:#fff;font-weight:600;padding:12px 30px;border-radius:50px;width:100%;transition:all .3s ease}.btn-connect:hover{background-color:#004d40;border-color:#004d40;transform:translateY(-2px)}.app-container{display:none;height:100vh;width:100vw;background:#fff;margin:0}.sidebar{background:#004d40;color:#fff;border-right:1px solid #00332c;display:flex;flex-direction:column;height:100vh}.search-box{padding:15px;background:#004d40}.search-box input{background:#00796b;border:none;border-radius:5px;color:#fff;padding:8px 12px;width:100%;outline:0;font-size:14px}.chat-list{flex:1;overflow-y:auto}.chat-item{padding:15px;border-bottom:1px solid #00332c;cursor:pointer;display:flex;align-items:center;color:#fff}.chat-item.active,.chat-item:hover{background:#00796b}.chat-item img{width:40px;height:40px;border-radius:50%;margin-right:12px}.sidebar-footer{padding:15px;background:#00332c;border-top:1px solid #00221d}.btn-logout{background-color:#e57373;border:none;color:#fff;padding:10px 15px;border-radius:8px;font-weight:600;width:100%;transition:all .3s ease}.btn-logout:hover{background-color:#c62828;transform:translateY(-1px)}.chat-area{display:flex;flex-direction:column;background:#e0f2f1;background-image:url(https://www.transparenttextures.com/patterns/cubes.png);height:100vh}.chat-header{background:#004d40;color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}.chat-header-info{display:flex;align-items:center}.chat-header img{width:40px;height:40px;border-radius:50%;margin-right:15px}.chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}.message{margin-bottom:15px;display:flex;flex-direction:column;max-width:70%;position:relative}.message.received{align-items:flex-start;align-self:flex-start}.message.sent{align-items:flex-end;align-self:flex-end}.bubble{padding:10px 15px;border-radius:12px;font-size:14px;color:#fff}.received .bubble{background:#00796b;border-top-left-radius:0}.sent .bubble{background:#004d40;border-top-right-radius:0}.chat-footer{padding:15px;background:#004d40;display:flex;align-items:center}.chat-footer input{flex:1;background:#00796b;border:none;border-radius:20px;padding:10px 20px;color:#fff}.send-btn{background:0 0;border:none;color:#fff;font-size:22px;margin-left:15px;cursor:pointer}</style></head><body><div class="connect-screen" id="connectScreen"><div class="wallet-card"><div class="brand-logo"><i class="fas fa-comments"></i></div><h2>ARC Chat</h2><p>Connect your Web3 Wallet to start secure, end-to-end blockchain conversations.</p><button class="btn btn-connect btn-lg" onclick="connectWallet()"><i class="fas fa-wallet mr-2"></i>Connect Wallet</button><div class="mt-3 text-muted" id="syncStatus" style="font-size:11px">Checking previous connection...</div></div></div><div class="app-container row no-gutters" id="appScreen"><div class="col-md-4 col-4 sidebar"><div class="search-box"><input id="searchAddressInput" placeholder="Search Wallet Address + Enter..." onkeypress="handleSearch(event)"></div><div class="chat-list" id="chatListContainer"></div><div class="sidebar-footer"><button class="btn-logout" onclick="logoutWallet()"><i class="fas fa-sign-out-alt mr-2"></i>Log out</button></div></div><div class="col-md-8 col-8 chat-area" id="chatAreaContainer"><div class="no-chat-selected" id="noChatPlaceholder">Select or search a user to start conversation</div><div id="activeChatBox" style="display:none;flex-direction:column;height:100%"><div class="chat-header"><div class="chat-header-info"><img src="https://ui-avatars.com/api/?name=User&background=random" id="activeChatAvatar" alt="Avatar"><div><h5 class="mb-0" id="activeChatTitle">0x000...000</h5></div></div></div><div class="chat-body" id="chatBody"></div><div class="chat-footer"><input id="messageInput" placeholder="Write a message..."><button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div></div></div></div><script>const CONTRACT_ADDRESS="0xfabD9624E0e46437D67d9601D4021cA9571BEE24";
const contractABI=["function sendMessage(address _receiver, string _content) public","function getMessagesWith(address _otherPerson) public view returns (tuple(uint256 id, address sender, address receiver, string content, uint256 timestamp, bool isEdited, bool isDeleted)[])","function getUserChatList(address _user) public view returns (tuple(address walletAddress, uint256 lastMessageTimestamp)[])"];

let provider, signer, contract, userAccount, activeChatUser=null, globalSyncInterval=null;

$(document).ready(async function() {
    if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.listAccounts();
        if (accounts.length > 0) {
            userAccount = accounts[0];
            await initApp();
        } else { $("#syncStatus").text("Please connect your wallet."); }
    }
});

async function initApp() {
    signer = provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, contractABI, signer);
    $("#connectScreen").hide();
    $("#appScreen").css("display","flex");
    await loadChatHistory();
    startGlobalSync();
}

async function connectWallet(){
    try {
        const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
        userAccount = accounts[0];
        await initApp();
    } catch(e) { console.error(e) }
}

function startGlobalSync(){
    if(globalSyncInterval) clearInterval(globalSyncInterval);
    globalSyncInterval = setInterval(async()=>{ if(activeChatUser) await loadMessages(); }, 5000);
}

async function loadChatHistory(){
    const list = await contract.getUserChatList(userAccount);
    $("#chatListContainer").empty();
    list.forEach(item => {
        $("#chatListContainer").append(`<div class="chat-item" onclick="openConversation('${item.walletAddress}')"><div>${item.walletAddress.substring(0,8)}...</div></div>`);
    });
}

function handleSearch(e){
    if(e.key === "Enter"){
        let addr = $("#searchAddressInput").val().trim();
        if(ethers.utils.isAddress(addr)) openConversation(addr);
    }
}

async function openConversation(addr){
    activeChatUser = addr;
    $("#noChatPlaceholder").hide();
    $("#activeChatBox").css("display","flex");
    $("#activeChatTitle").text(addr);
    loadMessages();
}

async function loadMessages(){
    const msgs = await contract.getMessagesWith(activeChatUser);
    $("#chatBody").empty();
    msgs.forEach(msg => {
        const type = msg.sender.toLowerCase() === userAccount.toLowerCase() ? "sent" : "received";
        $("#chatBody").append(`<div class="message ${type}"><div class="bubble">${msg.content}</div></div>`);
    });
}

async function sendMessage(){
    const content = $("#messageInput").val();
    if(content && activeChatUser){
        const tx = await contract.sendMessage(activeChatUser, content);
        await tx.wait();
        $("#messageInput").val("");
        loadMessages();
    }
}

function logoutWallet() {
    if(confirm("Are you sure you want to log out?")) {
        window.location.reload(); // මෙය භාවිතා කිරීමෙන් browser session එක සම්පූර්ණයෙන් අලුත් වේ.
    }
}</script></body></html>
